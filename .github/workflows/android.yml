name: Android CI

on:
  push:
    branches: [main]
    paths: ["apps/android/**", ".github/workflows/android.yml"]
  pull_request:
    paths: ["apps/android/**", ".github/workflows/android.yml"]

defaults:
  run:
    working-directory: apps/android

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Provide client config
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://tlpjezahslgtodxddzws.supabase.co' }}" >> local.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> local.properties
          echo "API_BASE_URL=${{ secrets.API_BASE_URL || 'https://doppio-gamma.vercel.app' }}" >> local.properties

      - name: Build, lint, unit test
        run: ./gradlew assembleDebug lintDebug testDebug --no-daemon --stacktrace
